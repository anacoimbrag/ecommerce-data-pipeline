services:
  metabase:
    build: ./metabase
    image: metabase_duckdb:latest
    container_name: metabase_duckdb
    ports:
      - "3001:3000"
    environment:
      - MB_DB_FILE=/home/metabase/data/metabase.db
    volumes:
      - ./output:/data:ro
      - ./metabase/data:/home/metabase/data

  meltano:
    image: meltano/meltano:v3-python3.11
    working_dir: /project
    env_file:
      - .env
    volumes:
      - .:/project
    networks:
      - cdp-shared-net
    command: ["--help"]

  ga4-loader:
    build: ./scripts
    env_file:
      - .env
    environment:
      - WAREHOUSE_PATH=/output/warehouse.duckdb
    volumes:
      - ./output:/output
      - ../ga4_bigquery_export:/ga4_source:ro

  ga4-site-traffic-loader:
    build: ./scripts
    command: ["python", "load_ga4_site_traffic.py"]
    env_file:
      - .env
    environment:
      - WAREHOUSE_PATH=/output/warehouse.duckdb
    volumes:
      - ./output:/output
      - ../ga4_bigquery_export:/ga4_source:ro

  dbt:
    build: ./transform
    environment:
      - WAREHOUSE_PATH=/output/warehouse.duckdb
    volumes:
      - ./output:/output
      - ./transform:/app

  bq-export:
    build: ./scripts
    command: ["python", "export_marts_to_bigquery.py"]
    env_file:
      - .env
    environment:
      - WAREHOUSE_PATH=/output/warehouse.duckdb
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/service-account.json
    volumes:
      - ./output:/output:ro
      - ./secrets:/secrets:ro

  # Camada de ML (ver ml/README.md pra ordem completa de execução do
  # pipeline batch). Cada serviço abaixo é um passo one-shot, igual ao
  # `dbt`/`bq-export` acima — não roda como processo de longa duração.
  ml-segmentation:
    build: ./ml
    environment:
      - WAREHOUSE_PATH=/output/warehouse.duckdb
    volumes:
      - ./output:/output

  ml-campaigns:
    build: ./ml
    command: ["python", "campaigns/train_propensity.py"]
    environment:
      - WAREHOUSE_PATH=/output/warehouse.duckdb
    volumes:
      - ./output:/output

  ml-recommendations:
    build: ./ml
    command: ["python", "recommendations/train_item_similarity.py"]
    environment:
      - WAREHOUSE_PATH=/output/warehouse.duckdb
    volumes:
      - ./output:/output

  ml-export:
    build: ./ml
    command: ["python", "export_to_serving_store.py"]
    environment:
      - WAREHOUSE_PATH=/output/warehouse.duckdb
      - SERVING_STORE_PATH=/output/serving_store.sqlite
    volumes:
      - ./output:/output

  ml-api:
    build:
      context: ./ml
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - SERVING_STORE_PATH=/output/serving_store.sqlite
    volumes:
      - ./output:/output:ro

networks:
  cdp-shared-net:
    external: true
