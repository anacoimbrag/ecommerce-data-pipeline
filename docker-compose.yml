services:
  clickhouse:
    image: clickhouse/clickhouse-server:25.3
    container_name: clickhouse
    ports:
      - "8123:8123"
      - "9000:9000"
    environment:
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DB=${CLICKHOUSE_DATABASE:-raw}
    volumes:
      - clickhouse-data:/var/lib/clickhouse
    networks:
      - default
      - cdp-shared-net
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 20

  metabase:
    image: metabase/metabase:latest
    container_name: metabase
    ports:
      - "3001:3000"
    environment:
      - MB_DB_FILE=/metabase-data/metabase.db
    volumes:
      - ./metabase/data:/metabase-data
    depends_on:
      clickhouse:
        condition: service_healthy

  meltano:
    image: meltano/meltano:v3-python3.11
    working_dir: /project
    env_file:
      - .env
    volumes:
      - .:/project
    networks:
      - cdp-shared-net
    depends_on:
      clickhouse:
        condition: service_healthy
    command: ["--help"]

  ga4-loader:
    build: ./scripts
    env_file:
      - .env
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-raw}
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ../ga4_bigquery_export:/ga4_source:ro

  ga4-site-traffic-loader:
    build: ./scripts
    command: ["python", "load_ga4_site_traffic.py"]
    env_file:
      - .env
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
      - CLICKHOUSE_DATABASE=${CLICKHOUSE_DATABASE:-raw}
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ../ga4_bigquery_export:/ga4_source:ro

  dbt:
    build: ./transform
    environment:
      - CLICKHOUSE_HOST=clickhouse
      - CLICKHOUSE_PORT=8123
      - CLICKHOUSE_USER=${CLICKHOUSE_USER:-default}
      - CLICKHOUSE_PASSWORD=${CLICKHOUSE_PASSWORD:-}
    depends_on:
      clickhouse:
        condition: service_healthy
    volumes:
      - ./transform:/app

  # Camada de ML: projeto irmão ../ecommerce-machine-learning (ver ecommerce-machine-learning/README.md), fora
  # deste compose -- conecta neste ClickHouse pela rede externa
  # "cdp-shared-net" (ver ecommerce-machine-learning/docker-compose.yml).

networks:
  cdp-shared-net:
    external: true

volumes:
  clickhouse-data:
