services:
  meltano:
    image: meltano/meltano:v3-python3.11
    working_dir: /project
    env_file:
      - .env
    volumes:
      - .:/project
    networks:
      - cdp-shared-net
    command: ["--help"]

  ga4-loader:
    build: ./scripts
    env_file:
      - .env
    environment:
      - WAREHOUSE_PATH=/output/warehouse.duckdb
    volumes:
      - ./output:/output
      - ../ga4_bigquery_export:/ga4_source:ro

  dbt:
    build: ./transform
    environment:
      - WAREHOUSE_PATH=/output/warehouse.duckdb
    volumes:
      - ./output:/output
      - ./transform:/app

  bq-export:
    build: ./scripts
    command: ["python", "export_marts_to_bigquery.py"]
    env_file:
      - .env
    environment:
      - WAREHOUSE_PATH=/output/warehouse.duckdb
      - GOOGLE_APPLICATION_CREDENTIALS=/secrets/service-account.json
    volumes:
      - ./output:/output:ro
      - ./secrets:/secrets:ro

networks:
  cdp-shared-net:
    external: true
