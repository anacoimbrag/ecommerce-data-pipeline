name: agentic_cdp
version: "1.0.0"
config-version: 2
profile: agentic_cdp

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
clean-targets: ["target", "dbt_packages"]

models:
  agentic_cdp:
    staging:
      # view (não ephemeral) de propósito: o projeto irmão ../ecomm-ml/transform
      # lê esses modelos via source() (staging/*) -- ephemeral não existe
      # fisicamente no banco, só funciona inline dentro do mesmo projeto dbt.
      +materialized: view
      +schema: staging
    marts:
      +materialized: table
      +schema: marts
      +engine: MergeTree

# Descarta o schema raw ao final de um build bem-sucedido. Desativado.
# on-run-end:
#   - "{{ drop_raw_schema_if_successful() }}"
