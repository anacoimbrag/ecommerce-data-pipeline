name: agentic_cdp
version: "1.0.0"
config-version: 2
profile: agentic_cdp

model-paths: ["models"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
clean-targets: ["target", "dbt_packages"]

models:
  agentic_cdp:
    staging:
      +materialized: ephemeral
    marts:
      +materialized: table
      +schema: marts
    activation:
      +materialized: table
      +schema: activation

